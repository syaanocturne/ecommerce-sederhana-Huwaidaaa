<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Pesanan - Mammalia Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="orders">
    <div class="admin-app">
      <div id="sidebar-placeholder"></div>

      <main class="admin-main">
        <div id="topbar-placeholder"></div>

        <div class="admin-content">
          <div class="admin-panel">
            <div class="admin-panel-header">
              <h2><i class="fas fa-receipt"></i> Semua Pesanan (<span id="order-count">0</span>)</h2>
              <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
                <select id="filter-status" style="padding:0.6rem 1rem; border-radius:50px; border:1px solid rgba(139,69,19,0.25); font-family:inherit;">
                  <option value="all">Semua Status</option>
                  <option value="menunggu_pembayaran">Menunggu Pembayaran</option>
                  <option value="diproses">Diproses</option>
                  <option value="dikemas">Dikemas</option>
                  <option value="dikirim">Dikirim</option>
                  <option value="selesai">Selesai</option>
                  <option value="dibatalkan">Dibatalkan</option>
                </select>
                <input
                  type="text"
                  id="order-search"
                  placeholder="Cari Order ID / nama..."
                  style="padding:0.6rem 1rem; border-radius:50px; border:1px solid rgba(139,69,19,0.25); font-family:inherit;"
                />
              </div>
            </div>
            <div class="admin-table-wrap">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Order ID</th>
                    <th>Pelanggan</th>
                    <th>Item</th>
                    <th>Total</th>
                    <th>Bayar</th>
                    <th>Status</th>
                    <th>Tanggal</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody id="orders-table-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal detail pesanan -->
    <div class="admin-modal-overlay" id="order-detail-modal">
      <div class="admin-modal-box" style="max-width: 480px; text-align: left;">
        <h3 style="margin-bottom:1rem;"><i class="fas fa-receipt"></i> Detail Pesanan <span id="detail-order-id"></span></h3>
        <div id="order-detail-content" style="font-size:0.9rem; color:#6b4c2e;"></div>
        <div class="admin-modal-actions">
          <button class="btn btn-outline" onclick="closeOrderDetailModal()" style="flex:1;">Tutup</button>
        </div>
      </div>
    </div>

    <script src="js/admin-data.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/admin-orders.js"></script>
  </body>
</html>
