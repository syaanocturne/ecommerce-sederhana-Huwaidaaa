<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Admin - Mammalia</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="dashboard">
    <div class="admin-app">
      <div id="sidebar-placeholder"></div>

      <main class="admin-main">
        <div id="topbar-placeholder"></div>

        <div class="admin-content">
          <div class="stat-grid" id="stat-grid"></div>

          <div class="admin-panel">
            <div class="admin-panel-header">
              <h2><i class="fas fa-receipt"></i> Pesanan Terbaru</h2>
              <a href="orders.html" class="btn btn-outline btn-sm">Lihat Semua <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="admin-table-wrap">
              <table class="admin-table" id="recent-orders-table">
                <thead>
                  <tr>
                    <th>Order ID</th>
                    <th>Pelanggan</th>
                    <th>Total</th>
                    <th>Pembayaran</th>
                    <th>Status</th>
                    <th>Tanggal</th>
                  </tr>
                </thead>
                <tbody id="recent-orders-body"></tbody>
              </table>
            </div>
          </div>

          <div class="admin-panel">
            <div class="admin-panel-header">
              <h2><i class="fas fa-chart-simple"></i> Stok Produk Terendah</h2>
              <a href="products.html" class="btn btn-outline btn-sm">Kelola Produk <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="admin-table-wrap">
              <table class="admin-table" id="low-stock-table">
                <thead>
                  <tr>
                    <th>Produk</th>
                    <th>Kategori</th>
                    <th>Stok</th>
                    <th>Harga</th>
                  </tr>
                </thead>
                <tbody id="low-stock-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/admin-data.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/admin-dashboard.js"></script>
  </body>
</html>
