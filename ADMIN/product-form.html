<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Tambah Produk - Mammalia Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="product-form">
    <div class="admin-app">
      <div id="sidebar-placeholder"></div>

      <main class="admin-main">
        <div id="topbar-placeholder"></div>

        <div class="admin-content">
          <div class="admin-panel" style="max-width: 800px; margin: 0 auto;">
            <div class="admin-panel-header">
              <h2 id="form-heading"><i class="fas fa-plus"></i> Tambah Produk Baru</h2>
              <a href="products.html" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Kembali</a>
            </div>

            <form id="product-form">
              <div class="image-preview-box" id="image-preview-box">
                <span class="placeholder-text">
                  <i class="fas fa-image" style="font-size: 1.8rem; display:block; margin-bottom:0.5rem;"></i>
                  Pratinjau gambar akan muncul di sini
                </span>
              </div>

              <div class="form-group">
                <label for="p-image">URL Gambar Produk</label>
                <input type="text" id="p-image" placeholder="images/nama-file.jpg atau https://..." />
                <p class="error-msg">URL gambar wajib diisi.</p>
              </div>

              <div class="form-group">
                <label for="p-name">Nama Produk</label>
                <input type="text" id="p-name" placeholder="Contoh: Choco Chip Cookies" />
                <p class="error-msg">Nama produk minimal 3 karakter.</p>
              </div>

              <div class="form-grid-2">
                <div class="form-group">
                  <label for="p-category">Kategori</label>
                  <select id="p-category">
                    <option value="cookies">Cookies</option>
                    <option value="pastry">Pastry</option>
                    <option value="giftbox">Gift Box / Hampers</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="p-weight">Berat/Isi</label>
                  <input type="text" id="p-weight" placeholder="Contoh: 300gr" />
                  <p class="error-msg">Berat/isi wajib diisi.</p>
                </div>
              </div>

              <div class="form-grid-2">
                <div class="form-group">
                  <label for="p-price">Harga (Rp)</label>
                  <input type="number" id="p-price" placeholder="35000" min="0" />
                  <p class="error-msg">Harga harus lebih dari 0.</p>
                </div>
                <div class="form-group">
                  <label for="p-stock">Stok</label>
                  <input type="number" id="p-stock" placeholder="20" min="0" />
                  <p class="error-msg">Stok tidak boleh negatif.</p>
                </div>
              </div>

              <div class="form-grid-2">
                <div class="form-group">
                  <label for="p-badge">Badge (opsional)</label>
                  <select id="p-badge">
                    <option value="">Tidak ada</option>
                    <option value="New">New</option>
                    <option value="Best Seller">Best Seller</option>
                    <option value="Premium">Premium</option>
                    <option value="Hampers">Hampers</option>
                    <option value="Sehat">Sehat</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="p-rating">Rating (1-5)</label>
                  <input type="number" id="p-rating" placeholder="4.8" min="1" max="5" step="0.1" />
                </div>
              </div>

              <div class="form-group">
                <label for="p-desc">Deskripsi Produk</label>
                <textarea id="p-desc" rows="4" placeholder="Deskripsi menarik tentang produk ini..."></textarea>
                <p class="error-msg">Deskripsi minimal 15 karakter.</p>
              </div>

              <div style="display:flex; gap:0.8rem; margin-top:1.5rem;">
                <button type="submit" class="btn btn-brown" id="submit-product-btn" style="flex:1; justify-content:center; padding: 0.8rem;">
                  <i class="fas fa-floppy-disk"></i> <span id="submit-btn-text">Simpan Produk</span>
                </button>
                <a href="products.html" class="btn btn-outline" style="justify-content:center; padding: 0.8rem 1.2rem;">Batal</a>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <script src="js/admin-data.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/admin-product-form.js"></script>
  </body>
</html>
